# ─── UART ─────────────────────────────────────────────────────────────────────
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# ─── PWM ──────────────────────────────────────────────────────────────────────
CONFIG_PWM=y
CONFIG_PWM_CAPTURE=y

# ─── Logging / debug ──────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_UART_CONSOLE=y

# ─── Main thread stack ────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=2048

# ─── Heap (needed for any dynamic allocation) ─────────────────────────────────
CONFIG_HEAP_MEM_POOL_SIZE=1024